name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy ruff psutil flask flask-limiter rich cryptography
        pip install -e .

    - name: Run ruff linter checks
      run: |
        ruff check obsidian_codec tests

    - name: Run ruff formatter checks
      run: |
        ruff format --check obsidian_codec tests

    - name: Run mypy static type checks
      run: |
        mypy obsidian_codec

    - name: Run unit tests
      run: |
        python -m unittest discover tests
