name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy psutil flask flask-limiter rich
        pip install -e .

    - name: Syntax check
      run: |
        python -m compileall obsidian_codec

    - name: Run unit tests
      run: |
        python -m unittest discover tests
